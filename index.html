<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImagePrinters | Precision Industrial Printing</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="logo-container">
            <img src="logo.jpg" alt="ImagePrinters Logo" class="main-logo">
        </div>
        <ul class="nav-links">
            <li><a href="#services">Services</a></li>
            <li><a href="#clients">Our Clients</a></li>
            <li><a href="#contact" class="btn-primary">Get a Quote</a></li>
        </ul>
    </nav>

    <header class="hero">
        <h1>High-Impact Printing <br><span>For Global Industries</span></h1>
        <p>Specializing in medical, pharmaceutical, and technical document printing with unmatched precision.</p>
        <div class="cta-group">
            <a href="#contact" class="btn-dark">Start a Project</a>
        </div>
    </header>

    <section id="clients" class="client-section">
        <h2>Our Trusted Partners</h2>
        <div class="client-grid">
            <div class="client-logo-card"><img src="logo1.jpeg" alt="Client 1"></div>
            <div class="client-logo-card"><img src="logo2.jpeg" alt="Client 2"></div>
            <div class="client-logo-card"><img src="logo3.jpeg" alt="Client 3"></div>
            <div class="client-logo-card"><img src="logo4.jpeg" alt="Client 4"></div>
            <div class="client-logo-card"><img src="logo5.jpeg" alt="Client 5"></div>
            <div class="client-logo-card"><img src="logo6.jpeg" alt="Client 6"></div>
            <div class="client-logo-card"><img src="logo7.jpeg" alt="Client 7"></div>
            <div class="client-logo-card"><img src="logo8.jpeg" alt="Client 8"></div>
            <div class="client-logo-card"><img src="logo9.jpeg" alt="Client 9"></div>
            <div class="client-logo-card"><img src="logo10.jpeg" alt="Client 10"></div>
            <div class="client-logo-card"><img src="logo11.jpeg" alt="Client 11"></div>
            <div class="client-logo-card"><img src="logo12.jpeg" alt="Client 12"></div>
            <div class="client-logo-card"><img src="logo13.jpeg" alt="Client 13"></div>
            <div class="client-logo-card"><img src="logo14.jpeg" alt="Client 14"></div>
            <div class="client-logo-card"><img src="logo15.jpeg" alt="Client 15"></div>
        </div>
    </section>

    <footer id="contact">
        <p>&copy; 2026 ImagePrinters. All rights reserved.</p>
    </footer>

</body>
</html>
